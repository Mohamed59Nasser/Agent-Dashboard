<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة إدارة العمليات</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
font-family:Arial;
background:#f1f5f9;
padding:20px;
direction:rtl;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:1000px;
margin:auto;
}

input,button{
padding:10px;
margin:5px 0;
width:100%;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

.correct{
background:#d1fae5;
}

.wrong{
background:#fee2e2;
}
</style>
</head>

<body>

<div class="container">

<h2>منصة الاختبارات</h2>

<div id="loginBox">

<input type="text" id="username" placeholder="اسم المستخدم">
<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="login()">دخول</button>

</div>

<div id="mainBox" style="display:none;">

<h3 id="welcome"></h3>

<button onclick="loadQuizzes()">عرض الكويزات</button>

<div id="quizList"></div>

<div id="quizBox"></div>

<hr>

<h3>نتائج الاختبارات</h3>

<button onclick="loadScores()">عرض النتائج</button>

<button onclick="exportExcel()">تصدير Excel</button>

<table id="scoresTable">

<thead>
<tr>
<th>الاسم</th>
<th>الكويز</th>
<th>النتيجة</th>
<th>التاريخ</th>
<th>التفاصيل</th>
</tr>
</thead>

<tbody id="scoresBody"></tbody>

</table>

</div>

</div>

<script>

const firebaseBaseUrl = "https://agent-system-01-default-rtdb.firebaseio.com";

let currentUser = null;
let activeQuizQuestions = [];
let activeQuizName = "";

function login(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

fetch(`${firebaseBaseUrl}/users/${username}.json`)
.then(res=>res.json())
.then(user=>{

if(user && user.password === password){

currentUser = user;

document.getElementById("loginBox").style.display = "none";
document.getElementById("mainBox").style.display = "block";

document.getElementById("welcome").innerText =
`أهلاً ${user.fullName}`;

}else{

alert("بيانات غلط");

}

});

}

function loadQuizzes(){

fetch(`${firebaseBaseUrl}/quizzes.json`)
.then(res=>res.json())
.then(quizzes=>{

const quizList = document.getElementById("quizList");

quizList.innerHTML = "";

Object.keys(quizzes).forEach(name=>{

if(quizzes[name].target === currentUser.username){

quizList.innerHTML += `
<button onclick="startQuiz('${name}')">
${name}
</button>
`;

}

});

});

}

function startQuiz(name){

activeQuizName = name;

fetch(`${firebaseBaseUrl}/quizzes/${name}/questions.json`)
.then(res=>res.json())
.then(qs=>{

activeQuizQuestions = Object.values(qs);

let html = `<h3>${name}</h3>`;

activeQuizQuestions.forEach((q,i)=>{

html += `
<div style="border:1px solid #ddd;padding:10px;margin:10px 0;">

<p><b>${q.question}</b></p>

`;

q.opts.forEach((o,index)=>{

html += `

<label id="label_${i}_${index+1}">

<input type="radio"
name="q_${i}"
value="${index+1}">

${o}

</label>

<br>

`;

});

html += `</div>`;

});

html += `
<button onclick="submitQuizAnswers()">
إنهاء الاختبار
</button>
`;

document.getElementById("quizBox").innerHTML = html;

});

}

function submitQuizAnswers(){

let score = 0;

let answersReview = [];

activeQuizQuestions.forEach((q,i)=>{

const sel =
document.querySelector(`input[name="q_${i}"]:checked`);

const selectedAnswer =
sel ? parseInt(sel.value) : null;

const isCorrect =
selectedAnswer === q.correct;

if(isCorrect){
score++;
}

const correctLbl =
document.getElementById(`label_${i}_${q.correct}`);

if(correctLbl){
correctLbl.classList.add("correct");
}

if(sel && !isCorrect){

const wrongLbl =
document.getElementById(`label_${i}_${selectedAnswer}`);

if(wrongLbl){
wrongLbl.classList.add("wrong");
}

}

answersReview.push({

question:q.question,
selected:selectedAnswer,
correct:q.correct,
options:q.opts,
status:isCorrect ? "صح" : "غلط"

});

});

const result =
`${score} / ${activeQuizQuestions.length}`;

fetch(`${firebaseBaseUrl}/scores.json`,{

method:"POST",

body:JSON.stringify({

username:currentUser.username,
fullName:currentUser.fullName,
quizName:activeQuizName,
score:result,
answers:answersReview,
timestamp:new Date().toLocaleString("ar-EG")

})

})

.then(()=>{

let html = `
<h3>النتيجة النهائية: ${result}</h3>
`;

answersReview.forEach((a,index)=>{

html += `

<div style="
border:1px solid #ddd;
padding:10px;
margin:10px 0;
">

<p><b>السؤال ${index+1}</b></p>

<p>${a.question}</p>

<p>
حالتك:
<b>${a.status}</b>
</p>

<p>
إجابتك:
${a.selected ? a.options[a.selected-1] : "لم تجب"}
</p>

<p>
الإجابة الصحيحة:
${a.options[a.correct-1]}
</p>

</div>

`;

});

document.getElementById("quizBox").innerHTML = html;

loadScores();

});

}

function loadScores(){

fetch(`${firebaseBaseUrl}/scores.json`)
.then(res=>res.json())
.then(scores=>{

const body =
document.getElementById("scoresBody");

body.innerHTML = "";

Object.keys(scores).forEach(id=>{

const s = scores[id];

body.innerHTML += `

<tr>

<td>${s.fullName}</td>

<td>${s.quizName}</td>

<td>${s.score}</td>

<td>${s.timestamp}</td>

<td>

<button onclick="showDetails('${id}')">
عرض
</button>

</td>

</tr>

`;

});

});

}

function showDetails(id){

fetch(`${firebaseBaseUrl}/scores/${id}.json`)
.then(res=>res.json())
.then(data=>{

let html = `
<h2>تفاصيل اختبار ${data.fullName}</h2>
`;

data.answers.forEach((a,i)=>{

html += `

<div style="
border:1px solid #ddd;
padding:10px;
margin:10px 0;
">

<p>
<b>السؤال ${i+1}</b>
</p>

<p>${a.question}</p>

<p>${a.status}</p>

<p>
إجابته:
${a.selected ? a.options[a.selected-1] : "لم يجب"}
</p>

<p>
الإجابة الصحيحة:
${a.options[a.correct-1]}
</p>

</div>

`;

});

document.getElementById("quizBox").innerHTML = html;

});

}

function exportExcel(){

const table =
document.getElementById("scoresTable");

const wb =
XLSX.utils.table_to_book(table,{
sheet:"النتائج"
});

XLSX.writeFile(wb,"نتائج_الاختبارات.xlsx");

}

</script>

</body>
</html>
