<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الإدارة الكاملة ⚡</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; margin: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #f1f5f9; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اليوزر">
        <input type="password" id="password" placeholder="الباسورد">
        <button onclick="login()">دخول</button>
    </div>

    <div id="main-app" class="hidden">
        <div style="display:flex; justify-content:space-between;">
            <h3>أهلاً أدمن: <span id="user-name"></span></h3>
            <button style="background:red" onclick="logout()">خروج</button>
        </div>
        
        <div id="admin-tabs">
            <button onclick="loadAdminData('users')">إدارة الموظفين</button>
            <button onclick="loadAdminData('scores')">النتائج والتقارير</button>
        </div>

        <div id="data-area">
            <table id="admin-table">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const dbUrl = "https://agent-system-01-default-rtdb.firebaseio.com";
    let currentUser = null;

    window.onload = () => {
        const user = localStorage.getItem('user');
        if (user) { currentUser = JSON.parse(user); showApp(); }
    };

    async function login() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value.trim();
        
        if (u === "admin" && p === "admin") {
            currentUser = { username: "admin", role: "admin" };
            localStorage.setItem('user', JSON.stringify(currentUser));
            showApp();
        } else {
            const res = await fetch(`${dbUrl}/users/${u}.json`);
            const data = await res.json();
            if (data && data.password === p) {
                currentUser = { username: u, role: 'agent' };
                localStorage.setItem('user', JSON.stringify(currentUser));
                showApp();
            } else alert("بيانات غلط!");
        }
    }

    function showApp() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-name').innerText = currentUser.username;
    }

    // الدالة اللي بتعرض الجداول للأدمن (اللي كانت ناقصة في صورتك)
    async function loadAdminData(type) {
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        head.innerHTML = ""; body.innerHTML = "";

        const res = await fetch(`${dbUrl}/${type}.json`);
        const data = await res.json();

        if (!data) { body.innerHTML = "<tr><td colspan='3'>لا توجد بيانات حالياً في هذه القسم</td></tr>"; return; }

        if (type === 'users') {
            head.innerHTML = "<th>الموظف</th><th>الصلاحية</th>";
            Object.keys(data).forEach(u => {
                body.innerHTML += `<tr><td>${u}</td><td>${data[u].role || 'Agent'}</td></tr>`;
            });
        } else {
            head.innerHTML = "<th>الموظف</th><th>الكويز</th><th>الدرجة</th>";
            Object.keys(data).forEach(s => {
                body.innerHTML += `<tr><td>${data[s].username}</td><td>${data[s].quizName}</td><td>${data[s].score}</td></tr>`;
            });
        }
    }

    function logout() { localStorage.removeItem('user'); location.reload(); }
</script>
</body>
</html>
