# واستبدل الدوال دي بالكامل داخل `<script>`

```javascript
function submitQuizAnswers() {

    let score = 0;

    let answersReview = [];

    activeQuizQuestions.forEach((q, i) => {

        const sel = document.querySelector(`input[name="q_${i}"]:checked`);

        const selectedAnswer = sel ? parseInt(sel.value) : null;

        const isCorrect = selectedAnswer === q.correct;

        if(isCorrect) score++;

        // تلوين الإجابة الصحيحة
        const correctLbl =
        document.getElementById(`label_${i}_${q.correct}`);

        if(correctLbl) {
            correctLbl.classList.add('correct-ans');
        }

        // تلوين الإجابة الغلط
        if(sel && !isCorrect) {

            const wrongLbl =
            document.getElementById(`label_${i}_${selectedAnswer}`);

            if(wrongLbl) {
                wrongLbl.classList.add('wrong-ans');
            }
        }

        // حفظ تفاصيل الإجابة
        answersReview.push({

            question: q.question,

            selected: selectedAnswer,

            correct: q.correct,

            options: q.opts,

            status: isCorrect ? "صح" : "غلط"
        });
    });

    let res = `${score} / ${activeQuizQuestions.length}`;

    fetch(`${firebaseBaseUrl}/scores.json`, {

        method: 'POST',

        body: JSON.stringify({

            username: currentUser.username,

            fullName: currentUser.fullName,

            quizName: activeQuizName,

            score: res,

            answers: answersReview,

            timestamp: new Date().toLocaleString('ar-EG')
        })

    })
    .then(() => {

        let reviewHTML = `

            <div class="info-card">

                ✅ نتيجتك النهائية: ${res}

            </div>

        `;

        answersReview.forEach((a, index) => {

            reviewHTML += `

                <div style="
                    background:white;
                    padding:15px;
                    margin-bottom:10px;
                    border-radius:10px;
                    border:1px solid #cbd5e1;
                ">

                    <h4>سؤال ${index + 1}</h4>

                    <p>

                        <b>${a.question}</b>

                    </p>

                    <p style="
                        color:${a.status === 'صح' ? 'green' : 'red'};
                        font-weight:bold;
                    ">

                        حالتك: ${a.status}

                    </p>

                    <p>

                        <b>إجابتك:</b>

                        ${
                            a.selected
                            ? a.options[a.selected - 1]
                            : 'لم يتم الاختيار'
                        }

                    </p>

                    <p>

                        <b>الإجابة الصحيحة:</b>

                        ${a.options[a.correct - 1]}

                    </p>

                </div>
            `;
        });

        document.getElementById('quiz-questions-container').innerHTML =
        reviewHTML;

        document.getElementById('submit-quiz-btn').style.display = "none";

    });
}

function loadScoresAdmin() {

    fetch(`${firebaseBaseUrl}/scores.json`)

    .then(res => res.json())

    .then(scores => {

        const tbody = document.getElementById('admin-scores-list');

        tbody.innerHTML = '';

        if(!scores) {

            tbody.innerHTML = `
                <tr>
                    <td colspan="5">
                        لا توجد نتائج مسجلة.
                    </td>
                </tr>
            `;

            return;
        }

        Object.keys(scores).forEach(id => {

            let s = scores[id];

            tbody.innerHTML += `

                <tr>

                    <td>
                        <b>${s.fullName || s.username}</b>
                    </td>

                    <td>
                        ${s.quizName}
                    </td>

                    <td>

                        <span class="badge"
                        style="background:var(--success)">

                            ${s.score}

                        </span>

                    </td>

                    <td>
                        ${s.timestamp}
                    </td>

                    <td>

                        <button class="view-btn"

                        onclick="showScoreDetails('${id}')">

                            عرض التفاصيل

                        </button>

                    </td>

                </tr>
            `;
        });
    });
}

function showScoreDetails(scoreId) {

    fetch(`${firebaseBaseUrl}/scores/${scoreId}.json`)

    .then(res => res.json())

    .then(data => {

        let html = `

            <h3>
                تفاصيل اختبار ${data.fullName}
            </h3>

        `;

        data.answers.forEach((a, i) => {

            html += `

                <div style="
                    background:white;
                    padding:15px;
                    margin-bottom:10px;
                    border-radius:10px;
                    border:1px solid #cbd5e1;
                ">

                    <p>

                        <b>س${i+1}:</b>

                        ${a.question}

                    </p>

                    <p style="
                        color:${a.status === 'صح' ? 'green' : 'red'};
                        font-weight:bold;
                    ">

                        ${a.status}

                    </p>

                    <p>

                        <b>إجابته:</b>

                        ${
                            a.selected
                            ? a.options[a.selected - 1]
                            : 'لم يجب'
                        }

                    </p>

                    <p>

                        <b>الإجابة الصحيحة:</b>

                        ${a.options[a.correct - 1]}

                    </p>

                </div>
            `;
        });

        document.getElementById('info-box-title').innerText =
        "تفاصيل نتائج الاختبار";

        document.getElementById('info-content-area').innerHTML = html;

        switchView('info-display-box');
    });
}
