<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة العمليات</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; background: #007bff; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        input { padding: 8px; margin: 5px; width: 95%; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>

    <div id="main-app" class="hidden">
        <div id="header">
            <h3>أهلاً: <span id="user-display"></span></h3>
            <button onclick="logout()" style="background: red;">خروج</button>
        </div>
        
        <div id="admin-panel" class="hidden">
            <button onclick="loadSection('users')">إدارة الموظفين</button>
            <button onclick="loadSection('scores')">عرض النتائج</button>
            <button onclick="loadSection('schedule')">الجدول</button>
        </div>

        <div id="content-area"></div>
    </div>
</div>

<script>
    const dbUrl = "https://agent-system-01-default-rtdb.firebaseio.com";
    let currentUser = null;

    // --- التعديل الأساسي: الحفاظ على الجلسة بعد الـ Refresh ---
    window.onload = () => {
        const saved = localStorage.getItem('user');
        if (saved) {
            currentUser = JSON.parse(saved);
            showApp();
        }
    };

    async function login() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value.trim();
        
        if (u === "admin" && p === "admin") {
            currentUser = { username: "admin", role: "admin" };
            saveSession();
        } else {
            const res = await fetch(`${dbUrl}/users/${u}.json`);
            const data = await res.json();
            if (data && data.password === p) {
                currentUser = { username: u, role: 'agent' };
                saveSession();
            } else alert("بيانات غير صحيحة!");
        }
    }

    function saveSession() {
        localStorage.setItem('user', JSON.stringify(currentUser));
        showApp();
    }

    function showApp() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-display').innerText = currentUser.username;
        if (currentUser.role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
    }

    function logout() {
        localStorage.removeItem('user');
        location.reload();
    }

    // --- تحميل الأقسام زي ما كان عندك بالظبط ---
    async function loadSection(type) {
        const area = document.getElementById('content-area');
        const res = await fetch(`${dbUrl}/${type}.json`);
        const data = await res.json();
        
        let html = "<table>";
        if(type === 'users') html += "<tr><th>المستخدم</th><th>الصلاحية</th></tr>";
        else html += "<tr><th>المستخدم</th><th>الكويز</th><th>الدرجة</th></tr>";

        for(let key in data) {
            html += `<tr><td>${data[key].username || key}</td><td>${data[key].role || data[key].score || 'N/A'}</td></tr>`;
        }
        area.innerHTML = html + "</table>";
    }
</script>
</body>
</html>
