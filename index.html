<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة العمليات</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        /* باقي الستايل بتاعك كما هو */
    </style>
</head>
<body>

<div class="container">
    <div id="auth-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اليوزر">
        <input type="password" id="password" placeholder="الباسورد">
        <button onclick="login()">دخول</button>
    </div>

    <div id="main-app" class="hidden">
        <div id="user-info">أهلاً: <span id="user-display"></span></div>
        <button onclick="logout()">خروج</button>
        
        <div id="content"></div>
    </div>
</div>

<script>
    const dbUrl = "https://agent-system-01-default-rtdb.firebaseio.com";
    let currentUser = null;

    // --- التعديل الوحيد: التحقق من الجلسة ---
    window.onload = () => {
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            // هنا بنستدعي دالة إظهار الواجهة الأصلية بتاعتك
            showApp(); 
        }
    };

    function login() {
        // ... (كود اللوجن الخاص بك كما هو) ...
        // لما تتأكد من الدخول، أضف السطر ده:
        localStorage.setItem('user', JSON.stringify(currentUser));
        showApp();
    }

    function logout() {
        localStorage.removeItem('user');
        location.reload();
    }

    // باقي الدوال الخاصة بك كما هي تماماً بدون أي تعديل
</script>
</body>
</html>
