<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة العمليات المتكامل</title>
    <style>
        :root { --main: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .sidebar { width: 250px; background: var(--main); color: white; height: 100vh; position: fixed; padding: 20px; }
        .main-content { margin-right: 270px; padding: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        select, button { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen" class="container">
    <div class="card" style="width: 300px; margin: 100px auto;">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="user" placeholder="اسم المستخدم"><br><br>
        <input type="password" id="pass" placeholder="كلمة المرور"><br><br>
        <button onclick="login()" style="width: 100%;">دخول</button>
    </div>
</div>

<div id="app-screen" class="hidden">
    <div class="sidebar">
        <h3>لوحة التحكم</h3>
        <button onclick="loadView('users')">إدارة الموظفين</button><br><br>
        <button onclick="loadView('reports')">التقارير</button><br><br>
        <button onclick="logout()" style="background: #e74c3c;">خروج</button>
    </div>
    <div class="main-content" id="display-area">
        <div class="card">
            <h2 id="view-title">مرحباً بك في النظام</h2>
            <div id="table-container"></div>
        </div>
    </div>
</div>

<script>
    const dbUrl = "https://agent-system-01-default-rtdb.firebaseio.com";
    
    // تسجيل الدخول
    async function login() {
        const u = document.getElementById('user').value.trim().toLowerCase();
        const p = document.getElementById('pass').value.trim();
        if(u === "admin" && p === "admin") {
            localStorage.setItem('auth', JSON.stringify({role: 'admin'}));
            location.reload();
        }
    }

    // التحقق عند الفتح
    window.onload = () => {
        if(localStorage.getItem('auth')) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
        }
    };

    // تحميل الجداول مع تحكم الصلاحيات
    async function loadView(view) {
        const container = document.getElementById('table-container');
        const res = await fetch(`${dbUrl}/users.json`);
        const data = await res.json();
        
        let html = `<table><tr><th>الموظف</th><th>الدور الحالي</th><th>تعديل الدور</th></tr>`;
        for(let id in data) {
            html += `<tr>
                <td>${id}</td>
                <td>${data[id].role || 'Agent'}</td>
                <td>
                    <select onchange="updateRole('${id}', this.value)">
                        <option value="Agent">Agent</option>
                        <option value="Leader">Leader</option>
                        <option value="Quality">Quality</option>
                    </select>
                </td>
            </tr>`;
        }
        container.innerHTML = html + `</table>`;
    }

    // تحديث الدور في الداتا بيز
    function updateRole(userId, newRole) {
        fetch(`${dbUrl}/users/${userId}/role.json`, {
            method: 'PUT',
            body: JSON.stringify(newRole)
        }).then(() => alert("تم تحديث الصلاحية بنجاح!"));
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
