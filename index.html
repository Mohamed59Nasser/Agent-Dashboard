<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة إدارة العمليات ⚡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; }
        body { font-family: sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; max-width: 800px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .option-label { display: block; padding: 12px; margin: 6px 0; border: 2px solid #cbd5e1; border-radius: 8px; cursor: pointer; }
        .correct-ans { background: #d1fae5; border-color: #10b981; }
        .wrong-ans { background: #fee2e2; border-color: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-box">
        <h2>تسجيل الدخول ⚡</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>

    <div id="main-app" class="hidden">
        <div style="display:flex; justify-content:space-between;">
            <h3>أهلاً <span id="user-name"></span></h3>
            <button style="width:auto; background:var(--danger)" onclick="logout()">خروج</button>
        </div>
        <div id="quiz-list"></div>
        <div id="quiz-area" class="hidden">
            <div id="questions"></div>
            <button id="finish-btn" onclick="submitQuiz()">إنهاء</button>
        </div>
    </div>
</div>

<script>
    const dbUrl = "https://agent-system-01-default-rtdb.firebaseio.com";

    // التحقق من حالة الدخول عند فتح الصفحة
    window.onload = () => {
        const user = localStorage.getItem('user');
        if (user) {
            currentUser = JSON.parse(user);
            showApp();
        }
    };

    let currentUser = null;
    let activeQuiz = [];

    async function login() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value.trim();
        
        if (u === "admin" && p === "admin") {
            currentUser = { username: "admin", role: "admin" };
            saveAndShow();
        } else {
            const res = await fetch(`${dbUrl}/users/${u}.json`);
            const data = await res.json();
            if (data && data.password === p) {
                currentUser = { username: u, role: 'agent' };
                saveAndShow();
            } else alert("بيانات خاطئة");
        }
    }

    function saveAndShow() {
        localStorage.setItem('user', JSON.stringify(currentUser));
        showApp();
    }

    function showApp() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('user-name').innerText = currentUser.username;
        if(currentUser.role !== 'admin') loadQuizzes();
    }

    function logout() {
        localStorage.removeItem('user');
        location.reload();
    }

    async function loadQuizzes() {
        const res = await fetch(`${dbUrl}/quizzes.json`);
        const qs = await res.json();
        const list = document.getElementById('quiz-list');
        Object.keys(qs).forEach(name => {
            if(qs[name].target === currentUser.username) {
                list.innerHTML += `<button onclick="startQuiz('${name}')">${name}</button>`;
            }
        });
    }

    async function startQuiz(name) {
        const res = await fetch(`${dbUrl}/quizzes/${name}/questions.json`);
        activeQuiz = Object.values(await res.json());
        document.getElementById('quiz-list').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        
        const qDiv = document.getElementById('questions');
        activeQuiz.forEach((q, i) => {
            let html = `<p>${q.question}</p>`;
            q.opts.forEach((o, oi) => {
                html += `<label class="option-label" id="l_${i}_${oi+1}"><input type="radio" name="q_${i}" value="${oi+1}"> ${o}</label>`;
            });
            qDiv.innerHTML += html;
        });
    }

    function submitQuiz() {
        activeQuiz.forEach((q, i) => {
            const selected = document.querySelector(`input[name="q_${i}"]:checked`);
            document.getElementById(`l_${i}_${q.correct}`).classList.add('correct-ans');
            if(selected && selected.value != q.correct) 
                document.getElementById(`l_${i}_${selected.value}`).classList.add('wrong-ans');
        });
        document.getElementById('finish-btn').classList.add('hidden');
    }
</script>
</body>
</html>
