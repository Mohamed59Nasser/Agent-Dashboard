<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة إدارة العمليات الموحدة ⚡</title>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 950px; margin: auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .hidden { display: none !important; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 2px solid #eee; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="auth-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>

    <div id="main-app" class="hidden">
        <div class="navbar">
            <h3 id="welcome-msg"></h3>
            <button style="width: auto; background: var(--danger);" onclick="logout()">خروج</button>
        </div>
        
        <div id="admin-tools" class="hidden">
            <button onclick="loadSection('users')">إدارة الموظفين</button>
            <div id="content-area"></div>
        </div>
    </div>
</div>

<script>
    const dbUrl = "https://agent-system-01-default-rtdb.firebaseio.com";
    let currentUser = null;

    // --- ميزة الـ Refresh: السيستم بيفضل فاكرك ---
    window.onload = () => {
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            showApp();
        }
    };

    async function login() {
        const u = document.getElementById('username').value.trim().toLowerCase();
        const p = document.getElementById('password').value.trim();
        
        if (u === "admin" && p === "admin") {
            currentUser = { username: "admin", role: "admin" };
            saveSession();
        } else {
            const res = await fetch(`${dbUrl}/users/${u}.json`);
            const data = await res.json();
            if (data && data.password === p) {
                currentUser = { username: u, role: data.role || 'agent' };
                saveSession();
            } else alert("بيانات خاطئة!");
        }
    }

    function saveSession() {
        localStorage.setItem('user', JSON.stringify(currentUser));
        showApp();
    }

    function showApp() {
        document.getElementById('auth-box').classList.add('hidden');
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = "أهلاً: " + currentUser.username;
        if (currentUser.role === 'admin') {
            document.getElementById('admin-tools').classList.remove('hidden');
        }
    }

    function logout() {
        localStorage.removeItem('user');
        location.reload();
    }

    async function loadSection(type) {
        const area = document.getElementById('content-area');
        const res = await fetch(`${dbUrl}/${type}.json`);
        const data = await res.json();
        let html = "<table><tr><th>المستخدم</th><th>الصلاحية</th></tr>";
        for (let key in data) {
            html += `<tr><td>${key}</td><td>${data[key].role || 'Agent'}</td></tr>`;
        }
        area.innerHTML = html + "</table>";
    }
</script>
</body>
</html>
